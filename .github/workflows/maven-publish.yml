name: Maven Deploy & Release

on:
  push:
    tags:
      - "dc3.release.*"

jobs:
  maven-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build and deploy
        run: |
          mvn --settings .github/maven-settings.xml clean deploy -P deploy -DskipTests -B
        env:
          SERVER_ID: ${{ secrets.SERVER_ID }}
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Extract version from pom.xml
        id: extract_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.extract_version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ### Release Information
            - **Version:** `${{ steps.extract_version.outputs.version }}`
            - **Tag:** `${{ github.ref_name }}`
            - **Maven Central:** [io.github.pnoker:dc3-parent](https://central.sonatype.com/artifact/io.github.pnoker/dc3-parent)
            
            ---
            *This release was automatically generated by GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release completion
        run: |
          echo "🎉 Release process completed successfully!"
          echo "📦 Version: ${{ steps.extract_version.outputs.version }}"
          echo "🏷️ Tag: ${{ github.ref_name }}"
          echo "🔗 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "🔗 Maven Central: https://central.sonatype.com/artifact/io.github.pnoker/dc3-parent"
          echo "✅ All deployment and release tasks completed"
